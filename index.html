<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Posture Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; display: flex; justify-content: center; background: #000; }
    canvas { width: 100%; height: auto; border-radius: 10px; }
    #status { position: absolute; top: 20px; color: white; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 10px; }
  </style>
</head>
<body>
  <div id="status">Analyzing Posture...</div>
  <video id="input_video" style="display:none;"></video>
  <canvas id="output_canvas"></canvas>

  <script>
    const videoElement = document.getElementsByClassName('input_video')[0];
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDiv = document.getElementById('status');

    function onResults(results) {
      if (!results.poseLandmarks) return;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      // Draw the skeleton
      drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
      drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});

      // Simple Logic: Check if shoulders are level
      const leftShoulder = results.poseLandmarks[11];
      const rightShoulder = results.poseLandmarks[12];
      const diff = Math.abs(leftShoulder.y - rightShoulder.y);

      if (diff > 0.05) {
        statusDiv.innerText = "Shoulders Uneven!";
        statusDiv.style.color = "red";
      } else {
        statusDiv.innerText = "Good Alignment";
        statusDiv.style.color = "lightgreen";
      }

      canvasCtx.restore();
    }

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onResults);

    const camera = new Camera(document.getElementById('input_video'), {
      onFrame: async () => {
        canvasElement.width = 640;
        canvasElement.height = 480;
        await pose.send({image: document.getElementById('input_video')});
      },
      width: 640,
      height: 480
    });
    camera.start();
  </script>
</body>
</html>
